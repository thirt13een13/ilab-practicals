<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Motion Experiment - iLab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .experiment-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p { color: #666; font-size: 1.1em; }
        
        canvas {
            display: block;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f8f9fa;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .control-group label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .control-group input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .value-display {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        .results {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .result-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
        }
        .result-label { font-size: 0.9em; opacity: 0.9; margin-bottom: 5px; }
        .result-value { font-size: 1.8em; font-weight: bold; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="experiment-container">
        <div class="header">
            <h1>🔄 Pendulum Motion</h1>
            <p>Study Simple Harmonic Motion</p>
        </div>
        
        <canvas id="pendulumCanvas" width="800" height="300"></canvas>
        
        <div class="controls">
            <div class="control-group">
                <label>Length (m)</label>
                <input type="range" id="length" min="0.5" max="3" value="1.5" step="0.1">
                <div class="value-display"><span id="lengthValue">1.5</span> m</div>
            </div>
            <div class="control-group">
                <label>Mass (kg)</label>
                <input type="range" id="mass" min="0.1" max="5" value="1" step="0.1">
                <div class="value-display"><span id="massValue">1.0</span> kg</div>
            </div>
            <div class="control-group">
                <label>Initial Angle (°)</label>
                <input type="range" id="angle" min="5" max="60" value="30" step="1">
                <div class="value-display"><span id="angleValue">30</span>°</div>
            </div>
        </div>
        
        <div class="results">
            <h2 style="text-align:center; margin-bottom:15px;">Calculations</h2>
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">Period (T)</div>
                    <div class="result-value" id="periodValue">2.46 s</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Frequency (f)</div>
                    <div class="result-value" id="frequencyValue">0.41 Hz</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Max Velocity</div>
                    <div class="result-value" id="velocityValue">1.23 m/s</div>
                </div>
            </div>
        </div>
        
        <button onclick="resetPendulum()">🔄 Reset Pendulum</button>
    </div>

    <script>
        const canvas = document.getElementById('pendulumCanvas');
        const ctx = canvas.getContext('2d');
        
        let length = 1.5;
        let angle = 30 * Math.PI / 180;
        let angleVelocity = 0;
        let angleAcceleration = 0;
        const gravity = 9.81;
        const pivotX = 400;
        const pivotY = 50;
        const scale = 100;
        
        function updateValues() {
            document.getElementById('lengthValue').textContent = length.toFixed(1);
            const period = 2 * Math.PI * Math.sqrt(length / gravity);
            const frequency = 1 / period;
            const maxVelocity = Math.sqrt(2 * gravity * length * (1 - Math.cos(angle)));
            
            document.getElementById('periodValue').textContent = period.toFixed(2) + ' s';
            document.getElementById('frequencyValue').textContent = frequency.toFixed(2) + ' Hz';
            document.getElementById('velocityValue').textContent = maxVelocity.toFixed(2) + ' m/s';
        }
        
        function drawPendulum() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const bobX = pivotX + length * scale * Math.sin(angle);
            const bobY = pivotY + length * scale * Math.cos(angle);
            
            // Draw string
            ctx.beginPath();
            ctx.moveTo(pivotX, pivotY);
            ctx.lineTo(bobX, bobY);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw pivot
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#666';
            ctx.fill();
            
            // Draw bob
            ctx.beginPath();
            ctx.arc(bobX, bobY, 20, 0, 2 * Math.PI);
            ctx.fillStyle = '#667eea';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function updatePendulum() {
            angleAcceleration = (-gravity / length) * Math.sin(angle);
            angleVelocity += angleAcceleration * 0.016;
            angle += angleVelocity * 0.016;
            
            // Damping
            angleVelocity *= 0.999;
            
            drawPendulum();
            requestAnimationFrame(updatePendulum);
        }
        
        function resetPendulum() {
            angle = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
            angleVelocity = 0;
        }
        
        document.getElementById('length').addEventListener('input', (e) => {
            length = parseFloat(e.target.value);
            updateValues();
        });
        
        document.getElementById('mass').addEventListener('input', (e) => {
            document.getElementById('massValue').textContent = parseFloat(e.target.value).toFixed(1);
        });
        
        document.getElementById('angle').addEventListener('input', (e) => {
            document.getElementById('angleValue').textContent = e.target.value;
            angle = parseFloat(e.target.value) * Math.PI / 180;
            updateValues();
        });
        
        updateValues();
        updatePendulum();
    </script>
</body>
</html>
