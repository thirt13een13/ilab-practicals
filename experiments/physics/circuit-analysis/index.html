<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Analysis Experiment - iLab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .experiment-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .circuit-type {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .circuit-type button {
            padding: 10px 20px;
            border: 2px solid #f5576c;
            background: white;
            color: #f5576c;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .circuit-type button.active {
            background: #f5576c;
            color: white;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .control-group label { display: block; color: #555; font-weight: 600; margin-bottom: 10px; }
        .control-group input[type="range"] { width: 100%; margin: 10px 0; }
        .value-display { font-size: 2em; font-weight: bold; color: #f5576c; margin: 10px 0; }
        .results {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .result-item { text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; }
        .result-label { font-size: 0.9em; opacity: 0.9; margin-bottom: 5px; }
        .result-value { font-size: 1.8em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="experiment-container">
        <div class="header">
            <h1>⚡ Circuit Analysis</h1>
            <p>Analyze Series and Parallel Circuits</p>
        </div>
        
        <div class="circuit-type">
            <button class="active" onclick="setCircuit('series')">Series Circuit</button>
            <button onclick="setCircuit('parallel')">Parallel Circuit</button>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>Voltage (V)</label>
                <input type="range" id="voltage" min="1" max="24" value="12" step="0.1">
                <div class="value-display"><span id="voltageValue">12.0</span> V</div>
            </div>
            <div class="control-group">
                <label>R1 (Ω)</label>
                <input type="range" id="r1" min="10" max="500" value="100" step="1">
                <div class="value-display"><span id="r1Value">100</span> Ω</div>
            </div>
            <div class="control-group">
                <label>R2 (Ω)</label>
                <input type="range" id="r2" min="10" max="500" value="200" step="1">
                <div class="value-display"><span id="r2Value">200</span> Ω</div>
            </div>
        </div>
        
        <div class="results">
            <h2 style="text-align:center; margin-bottom:15px;">Circuit Analysis Results</h2>
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">Total Resistance</div>
                    <div class="result-value" id="totalR">300 Ω</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Total Current</div>
                    <div class="result-value" id="totalI">0.04 A</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Total Power</div>
                    <div class="result-value" id="totalP">0.48 W</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let circuitType = 'series';
        
        function setCircuit(type) {
            circuitType = type;
            document.querySelectorAll('.circuit-type button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            calculate();
        }
        
        function calculate() {
            const V = parseFloat(document.getElementById('voltage').value);
            const R1 = parseFloat(document.getElementById('r1').value);
            const R2 = parseFloat(document.getElementById('r2').value);
            
            let totalR, totalI;
            
            if (circuitType === 'series') {
                totalR = R1 + R2;
            } else {
                totalR = (R1 * R2) / (R1 + R2);
            }
            
            totalI = V / totalR;
            const totalP = V * totalI;
            
            document.getElementById('voltageValue').textContent = V.toFixed(1);
            document.getElementById('r1Value').textContent = R1;
            document.getElementById('r2Value').textContent = R2;
            document.getElementById('totalR').textContent = totalR.toFixed(1) + ' Ω';
            document.getElementById('totalI').textContent = totalI.toFixed(3) + ' A';
            document.getElementById('totalP').textContent = totalP.toFixed(2) + ' W';
        }
        
        document.getElementById('voltage').addEventListener('input', calculate);
        document.getElementById('r1').addEventListener('input', calculate);
        document.getElementById('r2').addEventListener('input', calculate);
        
        calculate();
    </script>
</body>
</html>
